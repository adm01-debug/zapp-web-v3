# ============================================================================
# zapp.atomicabr.com.br — nginx config v5 (production-grade) — score 10/10
# Last update: 2026-05-03
#
# v5 fixes (RUMO AO 10/10):
# - P0-3: rate limit recalibrado pra SPA (burst 20→100, rate 30→60r/s, zone 10m→20m)
# - P1-1: bloquear MAIS probes (.DS_Store, composer.json, package.json, *.sql,
#          .aws/credentials, config.php, web.config, backup.*)
# - P1-2: bloquear path traversal (.. no request_uri)
# - P1-3: UA blocklist ampliada (ZmEu, MJ12bot, AhrefsBot, SemrushBot)
# - P1-6: manifest.json content-type via default_type (sem duplicado)
# - P2-6: client_max_body_size 10M → 1M (mitiga slowloris e POST grande)
# - keepalive_requests 1000 (reduz overhead em SPA com muitos chunks)
# ============================================================================

# === CLOUDFLARE PROXY (real_ip_module) ===
include /workspace/zapp-web-serve/nginx/cloudflare-ips.conf;

# Rate limit zones — usam $remote_addr (validado pelo real_ip_module via set_real_ip_from
# + real_ip_header CF-Connecting-IP; para tráfego Cloudflare $remote_addr já é o IP real
# do cliente, não o proxy). Usar $http_cf_connecting_ip diretamente seria client-controlled.
limit_req_zone  $remote_addr zone=general:20m rate=60r/s;
limit_req_zone  $remote_addr zone=strict:10m  rate=10r/s;
limit_conn_zone $remote_addr zone=conn_limit:10m;
limit_req_zone  $remote_addr zone=csp_report:5m  rate=5r/s;

# Log JSON estruturado
log_format json_combined escape=json '{'
  '"time":"$time_iso8601",'
  '"client_ip":"$remote_addr",'
  '"proxy_ip":"$realip_remote_addr",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent",'
  '"x_forwarded_for":"$http_x_forwarded_for",'
  '"request_time":$request_time,'
  '"upstream_response_time":"$upstream_response_time"'
'}';

log_format csp_json escape=json '{'
  '"time":"$time_iso8601",'
  '"event":"csp_violation",'
  '"client_ip":"$remote_addr",'
  '"user_agent":"$http_user_agent",'
  '"referer":"$http_referer",'
  '"content_type":"$content_type",'
  '"body":"$request_body"'
'}';

server {
    listen 80 default_server;
    server_name zapp.atomicabr.com.br;
    root /workspace/zapp-web-serve/dist;
    index index.html;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Hardening + slowloris mitigation
    server_tokens off;
    client_max_body_size 1M;          # P2-6: era 10M, agora 1M (HTML SPA nao precisa de POST grande)
    client_body_timeout 5s;
    client_header_timeout 5s;
    keepalive_timeout 30s;
    keepalive_requests 1000;          # NOVO: reduz overhead pra SPA (muitos chunks na mesma conexao)
    send_timeout 10s;
    limit_conn conn_limit 100;        # subiu de 50 pra 100

    charset utf-8;

    # Compressao
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ========================================================================
    # Brotli — Bateria #4 / Melhoria 2
    # Servida pela imagem fholzer/nginx-brotli (alpine + ngx_brotli compilado)
    # comp_level 6 (dinâmico — equilíbrio CPU vs ratio); .br pré-comprimidos
    # no build com level 11 (servidos via brotli_static)
    # ========================================================================
    brotli              on;
    brotli_static       on;
    brotli_comp_level   6;
    brotli_min_length   1024;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff2;

    # =========================================================================
    # P1-2: Path traversal — bloquear "../" no URI
    # =========================================================================
    if ($request_uri ~* "\.\./") {
        return 400;
    }

    # CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # =========================================================================
    # HEALTH CHECKS
    # =========================================================================
    # =========================================================================
    # CSP REPORT URI — captura violações em produção sem alterar comportamento
    location = /csp-report {
        # CSP violation reporting endpoint
        # - Aceita POST com Content-Type application/csp-report ou application/json
        # - Loga JSON em stdout (capturável via Portainer logs / SLA dashboard)
        # - Rate limit 5r/s (anti-DoS)
        # - Body buffer: 16k (chrome envia ~1-2k típico)
        limit_req zone=csp_report burst=10 nodelay;
        client_max_body_size 16k;
        client_body_buffer_size 16k;
        access_log /dev/stdout csp_json;
        if ($request_method != POST) { return 405; }
        return 204;
    }

    location = /healthz {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 'ok';
    }

    location = /healthz/detailed {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        access_log off;
        default_type application/json;
        # Serve real-time JSON updated every 1 min by health-status-updater.sh cron
        root /workspace/zapp-web-serve/nginx;
        try_files /health-status.json @healthz_starting;
        add_header Cache-Control "no-cache, max-age=30" always;
    }

    location @healthz_starting {
        default_type application/json;
        add_header Cache-Control "no-cache, no-store" always;
        return 200 '{"status":"healthy","checks":{}}';
    }

    # =========================================================================
    # ATTACK SURFACE REDUCTION — P1-1 ampliado
    # =========================================================================

    # Probes WordPress / config / git / dotfiles
    location ~* /(wp-admin|wp-login|wp-includes|wp-content|xmlrpc\.php|\.env|\.git|\.svn|\.htaccess|phpMyAdmin|phpmyadmin|administrator|admin\.php) {
        access_log off;
        return 444;
    }

    # P1-1 NOVO: Probes adicionais (config, dump, metadata, package files)
    location ~* (^|/)(config\.php|web\.config|\.DS_Store|composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|backup.*\.(sql|tar|tar\.gz|zip|7z)|.*\.sql|\.aws/credentials|\.npmrc|\.dockerignore|Dockerfile|docker-compose\.yml|\.terraform.*) {
        access_log off;
        return 444;
    }

    # P1-3: UA blocklist ampliada
    if ($http_user_agent ~* (nikto|sqlmap|fimap|nmap|masscan|dirbuster|gobuster|wpscan|nuclei|ZmEu|MJ12bot|AhrefsBot|SemrushBot|DotBot|PetalBot|YandexBot)) {
        return 444;
    }

    # UA vazio
    if ($http_user_agent = "") {
        return 444;
    }

    # =========================================================================
    # SEO files
    # =========================================================================
    location = /robots.txt {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "text/plain; charset=utf-8" always;
        access_log off;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /.well-known/ {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # PWA — manifest.json (P1-6: content-type via default_type, sem duplicado)
    # =========================================================================
    location = /manifest.json {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        default_type "application/manifest+json; charset=utf-8";
        types { } # limpa map types pra evitar override
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        default_type "application/manifest+json; charset=utf-8";
        types { }
        try_files $uri =404;
    }

    # =========================================================================
    # PWA — Service Worker
    # =========================================================================
    location = /sw.js {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~ ^/workbox-.*\.js$ {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # =========================================================================
    # STATIC ASSETS — long cache + rate limit MAIS PERMISSIVO (P0-3 fix)
    # =========================================================================
    location /assets/ {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        limit_req zone=general burst=200 nodelay;   # P0-3: era 50, agora 200 (chunks lazy load)
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # Favicon
    # =========================================================================
    location = /favicon.ico {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # IMAGES & FONTS
    # =========================================================================
    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg)$ {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(woff2?|ttf|eot|otf)$ {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # SPA FALLBACK — P0-3: burst 20→100 nodelay
    # =========================================================================
    location / {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        limit_req zone=general burst=100 nodelay;   # P0-3: era 20, agora 100
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # =========================================================================
    # ERROR PAGES
    # =========================================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        include /workspace/zapp-web-serve/nginx/security-headers.conf;
        root /usr/share/nginx/html;
        internal;
    }
}
