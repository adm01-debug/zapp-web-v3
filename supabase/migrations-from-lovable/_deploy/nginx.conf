# ============================================================================
# zapp.atomicabr.com.br — nginx config (production-grade) v3
# Last update: 2026-05-03 — score target: 10/10
# Fix v3: include security-headers.conf em cada location (evita add_header trap)
# ============================================================================

limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

log_format json_combined escape=json '{'
  '"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent",'
  '"x_forwarded_for":"$http_x_forwarded_for",'
  '"request_time":$request_time,'
  '"upstream_response_time":"$upstream_response_time"'
'}';

server {
    listen 80 default_server;
    server_name zapp.atomicabr.com.br;
    root /workspace/repos/zapp-web/dist;
    index index.html;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    server_tokens off;
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    limit_conn conn_limit 50;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff2;

    # =========================================================================
    # HEALTH CHECKS
    # =========================================================================

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /healthz/detailed {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"zapp-web","version":"1.0","timestamp":"$time_iso8601"}';
    }

    # =========================================================================
    # ATTACK SURFACE REDUCTION (devolve 444 sem responder nada)
    # =========================================================================

    location ~* /(wp-admin|wp-login|wp-includes|wp-content|xmlrpc\.php|\.env|\.git|\.svn|\.htaccess|phpMyAdmin|phpmyadmin|administrator|admin\.php) {
        access_log off;
        return 444;
    }

    if ($http_user_agent ~* (nikto|sqlmap|fimap|nmap|masscan|dirbuster|gobuster|wpscan|nuclei)) {
        return 444;
    }

    if ($http_user_agent = "") {
        return 444;
    }

    # =========================================================================
    # STATIC ASSETS — long cache (chunks Vite tem hash, sao imutaveis)
    # =========================================================================

    location /assets/ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        limit_req zone=general burst=50 nodelay;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # PWA — service worker & manifests
    # =========================================================================

    location = /sw.js {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~ ^/workbox-.*\.js$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    location ~* \.(webmanifest|manifest\.json)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/manifest+json" always;
        try_files $uri =404;
    }

    location ~* \.(ico)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # =========================================================================
    # IMAGES & FONTS
    # =========================================================================

    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(woff2?|ttf|eot|otf)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # SPA FALLBACK — qualquer rota nao-arquivo cai em index.html
    # =========================================================================

    location / {
        include /workspace/zapp-web-nginx/security-headers.conf;
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        include /workspace/zapp-web-nginx/security-headers.conf;
        root /usr/share/nginx/html;
        internal;
    }
}
