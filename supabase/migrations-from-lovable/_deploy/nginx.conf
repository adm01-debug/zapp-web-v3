server {
    listen 80;
    server_name zapp.atomicabr.com.br;
    root /workspace/repos/zapp-web/dist;
    index index.html;

    # Health check endpoint for Traefik/monitoring
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/wasm;

    # Static assets — long cache (chunks Vite têm hash, são imutáveis)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # PWA: service worker NÃO pode cachear (deve atualizar imediatamente)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Workbox runtime
    location ~ ^/workbox-.*\.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Manifest e icons PWA
    location ~* \.(webmanifest|manifest\.json|ico)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static images/fonts
    location ~* \.(png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota não-arquivo cai em index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html SEM cache (deploys novos vistos imediatamente)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # Block common attack paths
    location ~* /(wp-admin|wp-login|\.env|\.git|phpMyAdmin) {
        return 444;
    }
}
