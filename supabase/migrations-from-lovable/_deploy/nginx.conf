# ============================================================================
# zapp.atomicabr.com.br — nginx config v4 (production-grade) — score 10/10
# Last update: 2026-05-03
#
# v4 fixes:
# - security headers em /healthz e /healthz/detailed
# - manifest.json com exact location (regex nao estava pegando)
# - rate limit por IP REAL (X-Forwarded-For) em vez de IP do Traefik
# - timeouts reduzidos para mitigar slowloris
# - robots.txt, sitemap.xml e .well-known/ servidos como arquivos estaticos
# - OPTIONS para CORS preflight tratado
# - cache-control duplicado de /assets/ corrigido (so add_header)
# ============================================================================

# Mapa: extrai o primeiro IP do X-Forwarded-For (formato "IP1, IP2, IP3")
# Se nao tiver XFF, usa $remote_addr (IP do Traefik) como fallback
map $http_x_forwarded_for $real_client_ip {
    default          $remote_addr;
    "~^([0-9.]+)"    $1;
}

# Rate limit zones — agora por IP REAL do cliente
limit_req_zone  $real_client_ip zone=general:10m rate=30r/s;
limit_req_zone  $real_client_ip zone=strict:10m  rate=5r/s;
limit_conn_zone $real_client_ip zone=conn_limit:10m;

# Log JSON estruturado (pronto pra Loki/ELK)
log_format json_combined escape=json '{'
  '"time":"$time_iso8601",'
  '"client_ip":"$real_client_ip",'
  '"remote_addr":"$remote_addr",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"referer":"$http_referer",'
  '"user_agent":"$http_user_agent",'
  '"x_forwarded_for":"$http_x_forwarded_for",'
  '"request_time":$request_time,'
  '"upstream_response_time":"$upstream_response_time"'
'}';

server {
    listen 80 default_server;
    server_name zapp.atomicabr.com.br;
    root /workspace/repos/zapp-web/dist;
    index index.html;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Hardening + slowloris mitigation (timeouts mais agressivos)
    server_tokens off;
    client_max_body_size 10M;
    client_body_timeout 5s;
    client_header_timeout 5s;
    keepalive_timeout 30s;
    send_timeout 10s;
    limit_conn conn_limit 50;

    charset utf-8;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff2;

    # =========================================================================
    # CORS preflight — OPTIONS retorna 204 (nginx limita add_header dentro de if,
    # entao os headers CORS so aparecem em respostas que passam por uma location).
    # Pra preflight de fetch externo, 204 ja eh suficiente.
    # =========================================================================
    if ($request_method = OPTIONS) {
        return 204;
    }

    # =========================================================================
    # HEALTH CHECKS — agora COM security headers
    # =========================================================================

    location = /healthz {
        include /workspace/zapp-web-nginx/security-headers.conf;
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 'ok';
    }

    location = /healthz/detailed {
        include /workspace/zapp-web-nginx/security-headers.conf;
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"zapp-web","version":"1.0","timestamp":"$time_iso8601"}';
    }

    # =========================================================================
    # ATTACK SURFACE REDUCTION
    # =========================================================================

    location ~* /(wp-admin|wp-login|wp-includes|wp-content|xmlrpc\.php|\.env|\.git|\.svn|\.htaccess|phpMyAdmin|phpmyadmin|administrator|admin\.php) {
        access_log off;
        return 444;
    }

    if ($http_user_agent ~* (nikto|sqlmap|fimap|nmap|masscan|dirbuster|gobuster|wpscan|nuclei)) {
        return 444;
    }

    if ($http_user_agent = "") {
        return 444;
    }

    # =========================================================================
    # SEO files (robots, sitemap, security.txt) — exact match, prioridade alta
    # =========================================================================

    location = /robots.txt {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "text/plain; charset=utf-8" always;
        access_log off;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /.well-known/ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # PWA — manifest.json (EXACT match, prioridade alta)
    # =========================================================================

    location = /manifest.json {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
        try_files $uri =404;
    }

    # =========================================================================
    # PWA — Service Worker
    # =========================================================================

    location = /sw.js {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    location ~ ^/workbox-.*\.js$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # =========================================================================
    # STATIC ASSETS — long cache (chunks Vite tem hash, sao imutaveis)
    # cache-control SO via add_header (sem expires duplicado)
    # =========================================================================

    location /assets/ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        limit_req zone=general burst=50 nodelay;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # Favicon
    # =========================================================================

    location = /favicon.ico {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # IMAGES & FONTS
    # =========================================================================

    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(woff2?|ttf|eot|otf)$ {
        include /workspace/zapp-web-nginx/security-headers.conf;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # SPA FALLBACK
    # =========================================================================

    location / {
        include /workspace/zapp-web-nginx/security-headers.conf;
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # =========================================================================
    # ERROR PAGES
    # =========================================================================

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        include /workspace/zapp-web-nginx/security-headers.conf;
        root /usr/share/nginx/html;
        internal;
    }
}
