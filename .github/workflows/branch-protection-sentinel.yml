name: Branch Protection Sentinel

on:
  pull_request:
    branches: [main, master]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new console.log
        run: |
          set -euo pipefail
          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          matches=$(git diff --diff-filter=AM --unified=0 "$base_ref"...HEAD -- src \
            | { grep -E '^\+[^+].*console\.log' || true; } \
            | { grep -v '// ignore-audit' || true; })

          if [ -n "$matches" ]; then
            echo "$matches"
            echo "Erro: console.log novo detectado em código de produção. Use logger.ts."
            exit 1
          fi

          echo "Nenhum console.log novo detectado."

      - name: Check for new explicit any
        run: |
          set -euo pipefail
          base_ref="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}"

          new_any_count=$(git diff --diff-filter=AM --unified=0 "$base_ref"...HEAD -- src \
            | { grep -E '^\+[^+].*:\s*any\b' || true; } \
            | { grep -v '// ignore-audit' || true; } \
            | wc -l \
            | tr -d ' ')

          if [ "$new_any_count" -gt 0 ]; then
            echo "Erro: explicit any novo detectado ($new_any_count). Tipar corretamente ou marcar com // ignore-audit quando inevitável."
            exit 1
          fi

          echo "Nenhum explicit any novo detectado."
