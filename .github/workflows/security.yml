name: Security & Compliance

# Scheduled-only (plus manual dispatch) so this never gates pull requests.
# The previous file was corrupted (a stray `...` document marker and an orphan
# env line) and its rls-audit job invoked a script that does not exist.
on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  gitleaks:
    name: 🔍 Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🔒 Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: "false"
