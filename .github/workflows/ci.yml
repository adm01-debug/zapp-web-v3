# =================================================
# ZAPP-WEB CI/CD Pipeline
# =================================================
# Triggered on: push to main, pull requests
# Jobs: lint, typecheck, test, build
# =================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

jobs:
  # ===========================================
  # JOB 1: Lint & Type Check
  # ===========================================
  lint-and-typecheck:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔎 Cache TypeScript Incremental Build
        uses: actions/cache@v4
        with:
          path: .tsbuildinfo
          key: ${{ runner.os }}-tsconfig-${{ hashFiles('tsconfig.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tsconfig-

      - name: 🔄 Check Supabase Types Sync
        run: npm run types:check
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_PR_NUMBER: ${{ github.event.number }}

      - name: 📝 Post Types Diff to PR
        if: failure() && github.event_name == 'pull_request' && hashFiles('types_diff.md') != ''
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: types_diff.md
          comment_tag: supabase_types_diff

      - name: 🔍 Run ESLint (changed files on PRs, full on push)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE"...HEAD -- '*.ts' '*.tsx' \
              | grep -Ev '^(dist|supabase/functions)/' || true)
            if [ -n "$CHANGED" ]; then
              echo "Linting changed files:"
              printf '  %s\n' $CHANGED
              npx eslint $CHANGED
            else
              echo "No lintable TS/TSX files changed."
            fi
          else
            npx eslint .
          fi

      - name: 🔎 Run TypeScript check
        run: npm run typecheck
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: false

      - name: 🛡️ Verify Domain Boundaries
        run: npm run check:domain

      - name: 📦 Validate Barrel Exports
        run: npm run check:barrels

  # ===========================================
  # JOB 2: Unit Tests
  # ===========================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🧪 Run Vitest with coverage
        run: npm run test -- --coverage --reporter=verbose
        env:
          CI: true

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================
  # JOB 3: Deno Edge Function Tests
  # ===========================================
  deno-edge-tests:
    name: 🦕 Deno Edge Function Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: 🧪 Run edge function Deno tests (evolution-api + public-api + webhook + dlq + _shared)
        run: |
          deno test \
            --allow-net \
            --allow-env \
            --allow-read \
            --reporter=pretty \
            supabase/functions/evolution-api/__tests__/ \
            supabase/functions/public-api/__tests__/ \
            supabase/functions/evolution-webhook/__tests__/ \
            supabase/functions/reprocess-failed-messages/__tests__/ \
            supabase/functions/_shared/__tests__/

  # ===========================================
  # JOB 3.5: Smoke Pre-Deploy (Evolution + WhatsApp Cloud)
  # ===========================================
  smoke-pre-deploy:
    name: 🚦 Smoke Pre-Deploy (Evolution + Cloud)
    runs-on: ubuntu-latest
    needs: [test, deno-edge-tests]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 🦕 Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund
      - name: 🚦 Run smoke pre-deploy
        run: npm run smoke:pre-deploy

  # ===========================================
  # JOB 4: Build
  # ===========================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, deno-edge-tests, smoke-pre-deploy]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🏗️ Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_EXTERNAL_SUPABASE_URL: ${{ secrets.VITE_EXTERNAL_SUPABASE_URL }}
          VITE_EXTERNAL_SUPABASE_ANON_KEY: ${{ secrets.VITE_EXTERNAL_SUPABASE_ANON_KEY }}

      - name: 📐 Validate performance budget (fail on regression)
        run: npm run perf:budget

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: 📐 Report bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "====================="
          du -sh dist/
          echo ""
          echo "JS Files:"
          find dist -name "*.js" -exec du -h {} \;
          echo ""
          echo "CSS Files:"
          find dist -name "*.css" -exec du -h {} \;

  # ===========================================
  # JOB 5: E2E Tests (Playwright)
  # ===========================================
  e2e:
    name: 🎭 E2E Tests (Standard)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/2', '2/2']
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund
      - name: 📦 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: 🎭 Install Playwright dependencies & browsers
        run: |
          sudo apt-get update && sudo apt-get install -y libglib2.0-0
          npx playwright install --with-deps chromium
      - name: 🚀 Start preview server
        run: |
          npx vite preview --port 4173 --host &
          npx wait-on http://localhost:4173 --timeout 60000
      - name: 🧪 Run Playwright tests (Standard Shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }} --grep-invert "@teams"
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  e2e-teams-matrix:
    name: 👥 Teams E2E (Role: ${{ matrix.role }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        role: [rh_agent, finance_agent, ti_admin, transfer_agent]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund
      - name: 📦 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: 🎭 Install Playwright dependencies & browsers
        run: |
          sudo apt-get update && sudo apt-get install -y libglib2.0-0
          npx playwright install --with-deps chromium
      - name: 🚀 Start preview server
        run: |
          npx vite preview --port 4173 --host &
          npx wait-on http://localhost:4173 --timeout 60000
      - name: 🧪 Run Teams E2E for ${{ matrix.role }}
        run: npx playwright test e2e/teams-security-integration.spec.ts --project=chromium
        env:
          CI: true
          E2E_BASE_URL: http://localhost:4173
          E2E_ROLE_UNDER_TEST: ${{ matrix.role }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Use specific credentials if available, otherwise fallback
          E2E_USER_EMAIL: ${{ secrets[format('E2E_EMAIL_{0}', matrix.role)] || secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets[format('E2E_PASS_{0}', matrix.role)] || secrets.E2E_USER_PASSWORD }}

      - name: 📊 Upload Teams E2E Report (${{ matrix.role }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-teams-${{ matrix.role }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7


  # ===========================================
  # JOB 5.5: Chat Coverage Report
  # ===========================================
  chat-coverage:
    name: 📊 Chat Coverage Report
    runs-on: ubuntu-latest
    needs: [test, e2e]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund
      - name: 📊 Generate Chat Coverage Report
        run: npm run report:coverage > chat-coverage-report.md
      - name: 📝 Post Coverage to PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: chat-coverage-report.md
          comment_tag: chat_coverage_report
      - name: 📊 Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-coverage-report
          path: chat-coverage-report.md

  # ===========================================
  # JOB 6: Security Audit
  # ===========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🔍 Check for secrets in code
        run: |
          echo "Checking for potential secrets..."
          ! grep -rn "SUPABASE_SERVICE_ROLE_KEY\|sk_live_\|sk_test_\|password\s*=\s*[\"']" --include="*.ts" --include="*.tsx" --include="*.js" src/ || echo "⚠️ Potential secrets found - please review"
