# =================================================
# ZAPP-WEB CI/CD Pipeline
# =================================================
# Triggered on: push to main, pull requests
# Jobs: lint, typecheck, test, build
# =================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

jobs:
  # ===========================================
  # JOB 1: Lint & Type Check
  # ===========================================
  lint-and-typecheck:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔍 Run ESLint (changed files on PRs, full on push)
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE"...HEAD -- '*.ts' '*.tsx' \
              | grep -Ev '^(dist|supabase/functions)/' || true)
            if [ -n "$CHANGED" ]; then
              echo "Linting changed files:"
              printf '  %s\n' $CHANGED
              npx eslint $CHANGED
            else
              echo "No lintable TS/TSX files changed."
            fi
          else
            npx eslint .
          fi

      - name: 🔎 Run TypeScript check
        run: npx tsc --noEmit
        continue-on-error: false

  # ===========================================
  # JOB 2: Unit Tests
  # ===========================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🧪 Run Vitest
        run: npm run test -- --coverage --reporter=verbose
        env:
          CI: true

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ===========================================
  # JOB 3: Build
  # ===========================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🏗️ Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_EXTERNAL_SUPABASE_URL: ${{ secrets.VITE_EXTERNAL_SUPABASE_URL }}
          VITE_EXTERNAL_SUPABASE_ANON_KEY: ${{ secrets.VITE_EXTERNAL_SUPABASE_ANON_KEY }}

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: 📐 Report bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "====================="
          du -sh dist/
          echo ""
          echo "JS Files:"
          find dist -name "*.js" -exec du -h {} \;
          echo ""
          echo "CSS Files:"
          find dist -name "*.css" -exec du -h {} \;

  # ===========================================
  # JOB 4: Security Audit
  # ===========================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📚 Install dependencies
        run: npm install --no-audit --no-fund

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🔍 Check for secrets in code
        run: |
          echo "Checking for potential secrets..."
          ! grep -rn "SUPABASE_SERVICE_ROLE_KEY\|sk_live_\|sk_test_\|password\s*=\s*[\"']" --include="*.ts" --include="*.tsx" --include="*.js" src/ || echo "⚠️ Potential secrets found - please review"
