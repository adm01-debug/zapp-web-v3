name: Apply ChatPanel Fixes
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply all 8 fixes via migration script
        run: node scripts/migrate-chatpanel.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fix: apply all 8 ChatPanel critical fixes

          1. Add hook imports (useTransferConversation, useScheduledMediaUpload, useSafeInteractiveMessage)
          2. Remove as any casts → type-safe dialog functions
          3. currentUserId: agent → real agent ID
          4. assignedTo: null → real assignedTo
          5. handleTransfer stub → useTransferConversation
          6. Signed URL TTL 1h → 7 days
          7. Upload error handling with toast
          8. Poll/contact status sent → sending"
          git push
