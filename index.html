    <style>
      /* Inline critical CSS to avoid CLS on initial load */
      :root {
        --background: 240 10% 3.9%;
      }
      body {
        background-color: hsl(var(--background));
        margin: 0;
        min-height: 100vh;
      }
      #root-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: hsl(var(--background));
        z-index: 9999;
        transition: opacity 0.3s ease;
        color: hsl(0 0% 96%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #root-loading-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
      #root-loading-subtitle { font-size: 12px; color: hsl(0 0% 70%); }
      #root-loading-dots { display: flex; align-items: center; justify-content: center; }
      .loader-dot {
        width: 12px;
        height: 12px;
        background: #25d366;
        border-radius: 50%;
        margin: 0 4px;
        animation: loader-pulse 1.5s infinite ease-in-out;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-pulse {
        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root-loading" aria-hidden="true">
      <div id="root-loading-title">Abrindo ZAPP Web</div>
      <div id="root-loading-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <div id="root-loading-subtitle">Carregando a plataforma...</div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        // Simple and robust loader removal
        window.__zappHideRootLoader = function () {
          const loader = document.getElementById('root-loading');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(() => { if (loader.parentNode) loader.remove(); }, 400);
          }
          // Clear recovery flag if app mounted successfully
          sessionStorage.removeItem('zapp_recovery_attempt');
        };

        // Automatic fallback: if after 8 seconds the loader is still there,
        // it means either React failed to mount OR it mounted but failed to call the hider.
        setTimeout(function() {
          const root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            window.__zappHideRootLoader();
          } else if (root) {
            // If still empty after 12s, attempt auto-recovery
            setTimeout(function() {
              if (root.childElementCount === 0) {
                console.error('[Boot] React failed to mount after 12s. Attempting auto-recovery...');
                
                // Check if we already tried recovering to avoid infinite loop
                if (!sessionStorage.getItem('zapp_recovery_attempt')) {
                  sessionStorage.setItem('zapp_recovery_attempt', 'true');
                  
                  const subtitle = document.getElementById('root-loading-subtitle');
                  if (subtitle) {
                    subtitle.innerHTML = 'Recuperando sistema (limpando cache)...';
                  }

                  // 1. Unregister Service Workers
                  if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                      for(let registration of registrations) {
                        registration.unregister();
                      }
                    });
                  }
                  
                  // 2. Clear Caches
                  if ('caches' in window) {
                    caches.keys().then(function(names) {
                      for (let name of names) caches.delete(name);
                    });
                  }
                  
                  // 3. Force Reload after a short delay
                  setTimeout(function() {
                    window.location.reload();
                  }, 1500);
                } else {
                  // If we already tried, show the manual link
                  const subtitle = document.getElementById('root-loading-subtitle');
                  if (subtitle) {
                    subtitle.innerHTML = 'Falha crítica no carregamento. <a href="javascript:location.reload()" style="color:#25d366;font-weight:bold;">Tentar novamente</a>';
                  }
                }
              }
            }, 4000);
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>

  </body>
