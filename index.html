    <!-- Theme flash prevention (dark/light + skin CSS vars) -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('theme');
          var isDark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
          // Restore skin CSS vars before React mounts
          var skin = localStorage.getItem('theme-custom-colors');
          if (skin) {
            var c = JSON.parse(skin);
            var normalizedPreset = (!c.preset || c.preset === 'purpure' || c.preset === 'default') ? 'corporate' : c.preset;
            var expectedMode = isDark ? 'dark' : 'light';
            var canReuseCachedVars = c.cssVarsCache && c.cachePreset === normalizedPreset && c.cacheMode === expectedMode;

            c.preset = normalizedPreset;

            if (!canReuseCachedVars) {
              delete c.cssVarsCache;
              delete c.cachePreset;
              delete c.cacheMode;
              localStorage.setItem('theme-custom-colors', JSON.stringify(c));
            }

            if (c.cssVarsCache) {
              var root = document.documentElement;
              var vars = c.cssVarsCache;
              for (var k in vars) {
                if (vars.hasOwnProperty(k)) root.style.setProperty('--' + k, vars[k]);
              }
            }
            if (c.borderRadius != null) {
              document.documentElement.style.setProperty('--radius', (c.borderRadius / 16) + 'rem');
            }
          }
        } catch(e){}
      })();
    </script>
