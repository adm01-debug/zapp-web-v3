    <style>
      /* Inline critical CSS to avoid CLS on initial load */
      :root {
        --background: 240 10% 3.9%;
      }
      body {
        background-color: hsl(var(--background));
        margin: 0;
        min-height: 100vh;
      }
      #root-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: hsl(var(--background));
        z-index: 9999;
        transition: opacity 0.3s ease;
        color: hsl(0 0% 96%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #root-loading-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
      #root-loading-subtitle { font-size: 12px; color: hsl(0 0% 70%); }
      #root-loading-dots { display: flex; align-items: center; justify-content: center; }
      .loader-dot {
        width: 12px;
        height: 12px;
        background: #25d366;
        border-radius: 50%;
        margin: 0 4px;
        animation: loader-pulse 1.5s infinite ease-in-out;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-pulse {
        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root-loading" aria-hidden="true">
      <div id="root-loading-title">Abrindo ZAPP Web</div>
      <div id="root-loading-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <div id="root-loading-subtitle">Carregando a plataforma...</div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById('root');
        var hidden = false;

        // Expose manual recovery for the "Tentar novamente" link
        window.__zappManualRetry = function () {
          try { sessionStorage.removeItem('zapp_recovery_attempt'); } catch (e) {}
          window.location.reload();
        };

        window.__zappHideRootLoader = function () {
          if (hidden) return;
          hidden = true;
          var loader = document.getElementById('root-loading');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.pointerEvents = 'none';
            setTimeout(function () { if (loader.parentNode) loader.remove(); }, 400);
          }
          try { sessionStorage.removeItem('zapp_recovery_attempt'); } catch (e) {}
          if (observer) { try { observer.disconnect(); } catch (e) {} }
        };

        // Hide loader the moment React renders ANYTHING into #root
        var observer = null;
        if (root && 'MutationObserver' in window) {
          observer = new MutationObserver(function () {
            if (root.childElementCount > 0) {
              window.__zappHideRootLoader();
            }
          });
          observer.observe(root, { childList: true });
        }

        // Safety net 1 (15s): if React mounted but forgot to call hider
        setTimeout(function () {
          if (hidden) return;
          if (root && root.childElementCount > 0) {
            window.__zappHideRootLoader();
            return;
          }

          // Safety net 2 (additional 8s): React really failed to mount
          setTimeout(function () {
            if (hidden || (root && root.childElementCount > 0)) {
              window.__zappHideRootLoader();
              return;
            }
            console.error('[Boot] React failed to mount after 23s.');

            var hasRecovered = false;
            try { hasRecovered = sessionStorage.getItem('zapp_recovery_attempt') === 'true'; } catch (e) {}

            if (!hasRecovered) {
              try { sessionStorage.setItem('zapp_recovery_attempt', 'true'); } catch (e) {}
              var subtitle = document.getElementById('root-loading-subtitle');
              if (subtitle) subtitle.innerHTML = 'Recuperando sistema (limpando cache)...';

              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  regs.forEach(function (r) { r.unregister(); });
                }).catch(function () {});
              }
              if ('caches' in window) {
                caches.keys().then(function (names) {
                  names.forEach(function (n) { caches.delete(n); });
                }).catch(function () {});
              }
              setTimeout(function () { window.location.reload(); }, 1500);
            } else {
              var subtitle2 = document.getElementById('root-loading-subtitle');
              if (subtitle2) {
                subtitle2.innerHTML = 'Falha crítica no carregamento. <a href="javascript:window.__zappManualRetry()" style="color:#25d366;font-weight:bold;">Tentar novamente</a>';
              }
            }
          }, 8000);
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>

  </body>
