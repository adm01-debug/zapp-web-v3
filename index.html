    <style>
      /* Inline critical CSS to avoid CLS on initial load */
      :root {
        --background: 240 10% 3.9%;
      }
      body {
        background-color: hsl(var(--background));
        margin: 0;
        min-height: 100vh;
      }
      #root-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: hsl(var(--background));
        z-index: 9999;
        transition: opacity 0.3s ease;
        color: hsl(0 0% 96%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #root-loading-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
      #root-loading-subtitle { font-size: 12px; color: hsl(0 0% 70%); }
      #root-loading-dots { display: flex; align-items: center; justify-content: center; }
      .loader-dot {
        width: 12px;
        height: 12px;
        background: #25d366;
        border-radius: 50%;
        margin: 0 4px;
        animation: loader-pulse 1.5s infinite ease-in-out;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-pulse {
        0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>

  <body>
    <div id="root"></div>
    <!-- Boot Loader -->
    <div id="root-loading" style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease;color:#fff;font-family:sans-serif;">
      <div style="text-align:center;">
        <div style="font-weight:bold;margin-bottom:10px;">ZAPP Web</div>
        <div style="font-size:12px;opacity:0.7;">Carregando...</div>
      </div>
    </div>
    <script>
      // Preview recovery: nuke any stale service worker / cache that may be
      // intercepting /src/main.tsx and freezing the boot loader.
      (function recoverPreview() {
        try {
          var FLAG = 'zapp_sw_purged_v2';
          if ('serviceWorker' in navigator && !sessionStorage.getItem(FLAG)) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadAny = regs.length > 0;
              return Promise.all(regs.map(function (r) { return r.unregister(); }))
                .then(function () {
                  if (typeof caches !== 'undefined') {
                    return caches.keys().then(function (keys) {
                      var hadCaches = keys.length > 0;
                      return Promise.all(keys.map(function (k) { return caches.delete(k); }))
                        .then(function () { return hadAny || hadCaches; });
                    });
                  }
                  return hadAny;
                })
                .then(function (needsReload) {
                  if (needsReload) {
                    sessionStorage.setItem(FLAG, '1');
                    window.location.reload();
                  }
                });
            }).catch(function () {});
          }
        } catch (e) { /* no-op */ }
      })();
    </script>
    <script>
      (function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('root-loading');
        window.__zappHideRootLoader = function() {
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function() { if (loader.parentNode) loader.remove(); }, 400);
          }
        };
        // Auto-hide as soon as React renders anything into #root
        var i = setInterval(function() {
          if (root && root.childElementCount > 0) {
            window.__zappHideRootLoader();
            clearInterval(i);
          }
        }, 100);
        // Safety timeout: hide loader after 6s so user is never trapped
        setTimeout(function() {
          clearInterval(i);
          if (root && root.childElementCount === 0) {
            var sub = document.getElementById('root-loading-subtitle');
            if (sub) sub.textContent = 'Recarregando…';
            setTimeout(function () { window.location.reload(); }, 800);
          } else {
            window.__zappHideRootLoader();
          }
        }, 6000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
